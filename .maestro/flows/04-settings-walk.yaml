# Settings via the More drawer. Anchors from cxh-8 screenshot.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- tapOn: ".*More.*"
- extendedWaitUntil:
    visible: "Settings"
    timeout: 10000
- tapOn: "Settings"
- extendedWaitUntil:
    visible: "PREFERENCES"
    timeout: 15000
- assertVisible: "Notifications"
- assertVisible: "Privacy"
- assertVisible: "Account"
- assertVisible: "Terms of Service"

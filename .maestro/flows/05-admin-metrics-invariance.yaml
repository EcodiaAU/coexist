# Metrics-vs-DB invariance: the UPCOMING / REGISTRATIONS / AVG ATTENDANCE
# cards on the admin Events screen must equal the DB-computed truth that
# scripts/app-tests/prehooks/coexist.sh derives via the canonical
# use-admin-events.ts query path (top-200 upcoming + top-200 past, status
# filtering, attended+walk-in averaging). The runner sources the prehook
# before this flow so the expectations land as MAESTRO_EXPECT_* env.
# Tracked: status_board b1aff12f. Pattern:
# maestro-mobile-stably-web-are-canonical-app-testing-2026-06-10.md s3b.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- tapOn: ".*More.*"
- extendedWaitUntil:
    visible: "Admin Home"
    timeout: 10000
- tapOn: "Admin Home"
- extendedWaitUntil:
    visible: "All Time"
    timeout: 15000
- tapOn: ".*More.*"
- extendedWaitUntil:
    visible: "Events"
    timeout: 10000
- tapOn: "Events"
- extendedWaitUntil:
    visible: "UPCOMING"
    timeout: 15000
- assertVisible: "REGISTRATIONS"
- assertVisible: "AVG ATTENDANCE"
# Copy each metric value to the clipboard, then assert equality against
# the prehook-supplied expectation. The hero cards render value above
# label (AdminHeroStat), so the value is the row's leading numeric tile.
- copyTextFrom: "${MAESTRO_EXPECT_UPCOMING}"
- assertTrue: ${maestro.copiedText == "${MAESTRO_EXPECT_UPCOMING}"}
- copyTextFrom: "${MAESTRO_EXPECT_REGISTRATIONS}"
- assertTrue: ${maestro.copiedText == "${MAESTRO_EXPECT_REGISTRATIONS}"}
- copyTextFrom: "${MAESTRO_EXPECT_AVG_ATTENDANCE}"
- assertTrue: ${maestro.copiedText == "${MAESTRO_EXPECT_AVG_ATTENDANCE}"}
- takeScreenshot: /tmp/maestro-cx-admin-metrics-invariance

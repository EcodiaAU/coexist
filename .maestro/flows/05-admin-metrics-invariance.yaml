# Metrics-vs-DB invariance: the UPCOMING / REGISTRATIONS / AVG ATTENDANCE
# cards on the admin Events screen must equal the DB-computed truth that
# scripts/app-tests/prehooks/coexist.sh derives via the canonical
# use-admin-events.ts query path (top-200 upcoming + top-200 past, status
# filtering, attended+walk-in averaging). The runner sources the prehook
# before this flow so the expectations land as MAESTRO_EXPECT_* env.
# Tracked: status_board b1aff12f. Pattern:
# maestro-mobile-stably-web-are-canonical-app-testing-2026-06-10.md s3b.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- tapOn: ".*More.*"
- extendedWaitUntil:
    visible: "Admin Home"
    timeout: 10000
- tapOn: "Admin Home"
# "All Time" is a select VALUE (pixels only, never devtools hierarchy
# text - the codified day-one trap; it red-herringed run 115704Z).
# Anchor on the admin tab labels like 03-admin-walk does.
- extendedWaitUntil:
    visible: "Collectives"
    timeout: 15000
- tapOn: ".*More.*"
- extendedWaitUntil:
    visible: "Events"
    timeout: 10000
- tapOn: "Events"
- extendedWaitUntil:
    visible: "UPCOMING"
    timeout: 15000
- assertVisible: "REGISTRATIONS"
- assertVisible: "AVG ATTENDANCE"
# FAIL CLOSED: if the prehook did not run, the expectations are empty and
# this flow must go RED, never vacuous green (fault-yield doctrine; this
# exact flow shipped as a false-green generator on 2026-06-10).
- assertTrue: ${"${MAESTRO_EXPECT_UPCOMING}" != "" && "${MAESTRO_EXPECT_REGISTRATIONS}" != "" && "${MAESTRO_EXPECT_AVG_ATTENDANCE}" != ""}
# Each DB-derived number must be findable on the stats surface. The find
# itself is the assert (a wrong on-screen number means no element matches
# the DB truth and the step fails). Fault class: stats math drift between
# use-admin-events.ts and what AdminHeroStat renders.
- assertVisible: "${MAESTRO_EXPECT_UPCOMING}"
- assertVisible: "${MAESTRO_EXPECT_REGISTRATIONS}"
- assertVisible: "${MAESTRO_EXPECT_AVG_ATTENDANCE}"
- takeScreenshot: /tmp/maestro-cx-admin-metrics-invariance

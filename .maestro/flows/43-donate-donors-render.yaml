# /donate/donors (DonorWallPage): public donor wall, render-only.
# Header title is "Donor Wall" (donor-wall.tsx:34). The body shows either
# the donor list or the "No donors yet" empty state - either branch is
# valid render-only coverage.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- openLink: "coexist://donate/donors"
# Visible h2 is "Our generous donors" (donor-wall.tsx:48); the Header
# title "Donor Wall" lives on the aria-label only ("Donor Wall page
# header"), not as direct visible text. Empty-state branch also OK
# (test substrate may have zero public donors at any time).
- extendedWaitUntil:
    visible: "Our generous donors"
    timeout: 15000
- assertVisible: ".*(People & organisations|No donors yet).*"
- takeScreenshot: /tmp/maestro-cx-donate-donors

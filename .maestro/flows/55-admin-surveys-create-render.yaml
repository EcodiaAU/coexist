# /admin/surveys/create render-only. Deep-link
# coexist://admin/surveys/create - the resolver's default branch
# forwards the verbatim path (use-deep-link.ts:36) so /admin/surveys/
# create mounts. Anchor: "Create Survey" h1
# (create-survey.tsx:1297, !isEdit branch) plus "Details" section
# heading. Test account is admin tier so RequireCapability
# `manage_surveys` passes; if it ever didn't, the Permission required
# EmptyState renders with the same Page wrapper.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- openLink: "coexist://admin/surveys/create"
- extendedWaitUntil:
    visible: "Create Survey"
    timeout: 20000
- assertVisible: "Details"
- assertVisible: "Survey Purpose"
- takeScreenshot: /tmp/maestro-cx-admin-surveys-create

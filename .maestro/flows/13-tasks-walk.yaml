# Member-side tasks page. Empty-state copy (All caught up!) holds.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- openLink: "coexist://tasks"
- extendedWaitUntil:
    visible: ".*(All caught up|tasks).*"
    timeout: 15000
- takeScreenshot: /tmp/maestro-cx-tasks

# Shop landing: Search + Featured strip. Empty-state safe.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- openLink: "coexist://shop"
- extendedWaitUntil:
    visible: "Shop"
    timeout: 15000
- assertVisible: ".*Search merch.*"
- takeScreenshot: /tmp/maestro-cx-shop

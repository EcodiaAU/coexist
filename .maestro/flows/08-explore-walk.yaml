# Explore screen via coexist:// deep link (the route is HomePage -> Explore;
# direct navigation is reliable, the Events tab on Home redirects here).
# Anchors: EXPLORE hero, Events / Collectives tab toggles, Discover Events.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- openLink: "coexist://explore"
- extendedWaitUntil:
    visible: "EXPLORE"
    timeout: 15000
- assertVisible: "Discover Events"
- assertVisible: "Events"
- assertVisible: "Collectives"
- tapOn: "Collectives"
- extendedWaitUntil:
    visible: ".*(Your Collectives|All collectives|Filter by type).*"
    timeout: 10000
- takeScreenshot: /tmp/maestro-cx-explore

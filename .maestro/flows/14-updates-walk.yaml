# Updates page. Render-only assertion (the page currently empties to its
# heading on this account); white-screen class detection.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- openLink: "coexist://updates"
- extendedWaitUntil:
    visible: "Updates"
    timeout: 15000
- takeScreenshot: /tmp/maestro-cx-updates

# Admin sweep: render-only deep-link assert across the remaining admin
# routes that have no flow yet. Catches white-screen / import-throw on
# each surface. Each route asserts the page's useAdminHeader title +
# (where applicable) the "Permission required" branch when the test
# admin lacks the gating capability (audit-log -> view_audit_log,
# photos -> view_reports, etc - see src/components/route-guard.tsx +
# src/App.tsx 443-490). Either-branch matchers mean the flow stays
# green regardless of which capabilities the test account holds, while
# still catching a true render failure.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
# /admin/audit-log
- openLink: "coexist://admin/audit-log"
- extendedWaitUntil:
    visible: ".*(Audit Log|Permission required).*"
    timeout: 20000
# /admin/challenges
- openLink: "coexist://admin/challenges"
- extendedWaitUntil:
    visible: ".*(Challenges|Permission required).*"
    timeout: 20000
# /admin/photos
- openLink: "coexist://admin/photos"
- extendedWaitUntil:
    visible: ".*(Photos|Permission required).*"
    timeout: 20000
# /admin/dev-tools
- openLink: "coexist://admin/dev-tools"
- extendedWaitUntil:
    visible: ".*(Dev Tools|Permission required).*"
    timeout: 20000
# /admin/create
- openLink: "coexist://admin/create"
- extendedWaitUntil:
    visible: ".*(Create|Permission required).*"
    timeout: 20000
# /admin/national-impact
- openLink: "coexist://admin/national-impact"
- extendedWaitUntil:
    visible: ".*(National Impact|Impact|Permission required).*"
    timeout: 20000
# /admin/exports redirects to /admin/insights#reports (App.tsx:464)
- openLink: "coexist://admin/exports"
- extendedWaitUntil:
    visible: ".*(Reports|Impact|Permission required).*"
    timeout: 20000
- takeScreenshot: /tmp/maestro-cx-admin-sweep-render

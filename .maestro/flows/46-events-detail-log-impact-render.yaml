# /events/:id/impact (LogImpactPage) render via LEADER ACTIONS tap.
# Deep-link to event detail, scroll to the LEADER ACTIONS rail, tap
# "Log Impact" - react-router navigates to /events/<id>/impact. Anchor:
# the "Volunteer Hours" + "Participants" section labels that are unique
# to this page (the header text renders only as aria-label
# "Log Impact page header" per the batch 4 anchor-gotcha codification,
# never as visible text). Same F4 deep-link constraint as 45. Log
# Impact button only renders when event.impact has NOT been logged yet
# (event-detail.tsx:1184 condition: !event.impact). The seed flow
# picks the next upcoming FREE public event; assumption: that event
# does not yet have an impact row. If a leader logs impact upstream
# this flow needs to seed a different event.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- runScript: ../scripts/seed-event-id.js
- openLink: "coexist://events/${output.eventId}"
- extendedWaitUntil:
    visible: "LEADER ACTIONS"
    timeout: 20000
- scrollUntilVisible:
    element:
      text: "Log Impact"
    direction: DOWN
    timeout: 8000
    speed: 40
- tapOn: "Log Impact"
- extendedWaitUntil:
    visible: "Volunteer Hours"
    timeout: 15000
- assertVisible: "Participants"
- takeScreenshot: /tmp/maestro-cx-events-log-impact

# Admin -> Metrics + Reports (now the unified Insights surface). Impact +
# Attendance (Metrics) + Reports were merged into one Insights page
# (2026-06-10); /admin/metrics and /admin/reports are legacy URLs that now
# redirect to /admin/insights (App.tsx: Navigate to /admin/insights#attendance
# and #reports). Verified on-device coexist_aosp 2026-06-22: both deep-links
# land on the authed Insights surface (hero "Insights", OVERVIEW stat grid,
# Select all). This flow asserts both legacy URLs resolve onto Insights.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - runFlow: ../subflows/relogin.yaml
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
# /admin/metrics -> redirects to /admin/insights#attendance
- openLink: "coexist://admin/metrics"
- extendedWaitUntil:
    visible: "Insights"
    timeout: 15000
- assertVisible: "OVERVIEW"
- assertVisible: "ATTENDANCES"
- takeScreenshot: /tmp/maestro-cx-admin-metrics-redirect
# /admin/reports -> redirects to /admin/insights#reports
- openLink: "coexist://admin/reports"
- extendedWaitUntil:
    visible: "Insights"
    timeout: 15000
- assertVisible: "OVERVIEW"
- assertVisible: "Select all"
- takeScreenshot: /tmp/maestro-cx-admin-reports-redirect

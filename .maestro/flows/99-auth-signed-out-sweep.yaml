# Auth-surface render sweep (signed-OUT state). clearState:true forces
# a fresh sign-in screen; the flow then deep-links into each auth route
# and asserts its anchor. After this flow the session is wiped, so the
# canonical authed 01-signin-authed-feed runs again and re-establishes
# the session for the rest of the suite. Auth routes covered:
#   /login (Welcome back)
#   /signup (Create account)
#   /forgot-password (Reset Password)
#   /reset-password (New Password)
#   /verify-email (Verify Your Email)
#   /welcome (Welcome)
# /onboarding /accept-terms /suspended need server-side state that
# this account does not satisfy; they are gated by RequireAuth shells
# and tested separately if and when the seed substrate provides them.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: true
    stopApp: true
# 30000 sat under the observed cold-start floor, so this flow went red on a blank frame while
# the app was still painting. clearState wipes the WebView cache, so THIS flow pays the full
# cold-start cost that flows running on a warm cache never see (71 does the identical
# clearState launch, renders in <15s, and passed in the very run this one failed). Verified
# 2026-07-13 by `pm clear` + cold launch on the modern AVD: the sign-in screen renders in
# full (Welcome back / Google / Apple / Email / Password / Log In / Create account). It is
# simply slower than 30s on a software-GPU emulator. Size the timeout to the floor.
#
# 2026-07-14: raising the timeout was NOT enough - this flow was still flaky (1 red in 3 back
# to back runs) and the red run died in ~1s, nowhere near its 90s budget. So it was never a
# timeout problem. With androidWebViewHierarchy=devtools, the FIRST hierarchy poll fires
# before the WebView's devtools target has attached after clearState; maestro reads an empty
# tree and fails the assert outright instead of polling out its window. Proven: `pm clear` +
# cold launch paints in 4-15s, and an identical clearState launch that SETTLES before the
# first poll renders the sign-in screen every time. So settle first, THEN assert. Do not
# "fix" a future red here by inflating the timeout again - check whether it died early.
- waitForAnimationToEnd:
    timeout: 15000
- extendedWaitUntil:
    visible: ".*(Welcome back|Welcome|Log In|Sign In|Create account|Get Started|I have an account).*"
    timeout: 90000
- takeScreenshot: /tmp/maestro-cx-auth-fresh-launch
# /login is the cleared-state landing; assert here first.
- openLink: "coexist://login"
- extendedWaitUntil:
    visible: ".*(Welcome back|Log In|Email).*"
    timeout: 15000
# /signup
- openLink: "coexist://signup"
- extendedWaitUntil:
    visible: ".*(Create account|Sign up|Sign Up|Get started|Already have an account).*"
    timeout: 15000
# /forgot-password
- openLink: "coexist://forgot-password"
- extendedWaitUntil:
    visible: ".*(Reset Password|Reset password|Forgot|email to receive).*"
    timeout: 15000
# /reset-password
- openLink: "coexist://reset-password"
- extendedWaitUntil:
    visible: ".*(New Password|Reset|Password).*"
    timeout: 15000
# /verify-email
- openLink: "coexist://verify-email"
- extendedWaitUntil:
    visible: ".*(Verify Your Email|Verify|verification|Check your email).*"
    timeout: 15000
# /welcome (marketing welcome, not /welcome-back)
- openLink: "coexist://welcome"
- extendedWaitUntil:
    visible: ".*(Welcome|Co-Exist|Get started|Sign in|Log in).*"
    timeout: 15000
- takeScreenshot: /tmp/maestro-cx-auth-sweep-end

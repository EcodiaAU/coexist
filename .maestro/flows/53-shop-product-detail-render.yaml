# /shop/:slug render-only. Seeds an active merch_products row via
# runScript, deep-links to coexist://shop/<slug>. The resolver's
# default branch (use-deep-link.ts:36) forwards the verbatim path so
# /shop/<slug> mounts. Anchor: product.name as the h1 (product-
# detail.tsx:540). Either "Cart" or "Buy Now" button satisfies the
# in-stock branch; the "Sold Out" + "Product not found" EmptyState
# also satisfy out-of-stock and bad-slug branches.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- runScript: ../scripts/seed-product-slug.js
- openLink: "coexist://shop/${output.productSlug}"
- extendedWaitUntil:
    visible: "${output.productName}"
    timeout: 20000
- takeScreenshot: /tmp/maestro-cx-shop-product-detail

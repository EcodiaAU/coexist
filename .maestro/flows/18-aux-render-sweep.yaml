# Aux/legal/marketing render sweep: deep-link to each page, assert its h1
# mounts. Catches the white-screen class (page errors at first paint) on a
# wide set of low-priority surfaces in one flow. Anchors are full-string
# headings observed 2026-06-10.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
# /about
- openLink: "coexist://about"
- extendedWaitUntil:
    visible: "About Co-Exist"
    timeout: 15000

# /impact/national: render-only walk. NationalImpactPage renders a Header
# titled "National Impact" + stat tiles. The page hits the impact summary
# query and falls back to an empty/loading state if data missing; the
# Header title is the stable anchor either way (header is mounted before
# the data resolves; loading + error branches reuse the same header at
# lines 294 and 311). Metric-vs-DB invariance for this surface is queued
# for its own flow (paired with the 05-admin-metrics-invariance pattern).
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- openLink: "coexist://impact/national"
# Page header is the aria-labelled "National Impact page header"; visible
# anchors are AUSTRALIA-WIDE + the stat tile labels. The hero stat tile
# text ("TREES PLANTED" / "event attendances") is the stable read-side
# proof the impact summary query landed - the count value is dynamic and
# can't anchor.
- extendedWaitUntil:
    visible: "AUSTRALIA-WIDE"
    timeout: 15000
- assertVisible: "TREES PLANTED"
- assertVisible: ".*(event attendances|volunteer hours).*"
- takeScreenshot: /tmp/maestro-cx-impact-national

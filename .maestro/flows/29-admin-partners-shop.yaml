# Admin -> Partners & Sponsors and Admin -> Merch & Store (shop).
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
# Partners
- openLink: "coexist://admin/partners"
- extendedWaitUntil:
    visible: "Partners & Sponsors"
    timeout: 15000
- assertVisible: "ORGANISATIONS"
- assertVisible: "OFFERS"
- assertVisible: "Organisations"
- assertVisible: "Add Organisation"
- takeScreenshot: /tmp/maestro-cx-admin-partners
# Shop
- openLink: "coexist://admin/shop"
- extendedWaitUntil:
    visible: "Merch & Store"
    timeout: 15000
- assertVisible: "Products"
- assertVisible: "Orders"
- assertVisible: "Inventory"
- assertVisible: ".*Search products.*"
- takeScreenshot: /tmp/maestro-cx-admin-shop

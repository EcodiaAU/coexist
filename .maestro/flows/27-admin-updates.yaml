# Admin -> Updates. Hero + New Update CTA + TOTAL/PINNED/URGENT/TARGETED
# metric cards + All/National/Collective filter pills.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- openLink: "coexist://admin/updates"
- extendedWaitUntil:
    visible: "New Update"
    timeout: 15000
- assertVisible: "TOTAL"
- assertVisible: "PINNED"
- assertVisible: "URGENT"
- assertVisible: "TARGETED"
- assertVisible: ".*Search updates.*"
- assertVisible: "National"
- assertVisible: "Collective"
- takeScreenshot: /tmp/maestro-cx-admin-updates

# Admin > Collectives > tap a row to land on /admin/collectives/:id.
# The list page (21-admin-collectives) anchors on the Collectives label;
# this flow extends that path by tapping the first row and asserting
# the detail page mounts. The detail page is AdminCollectiveDetailPage
# behind RequireCapability cap="manage_collectives" so the Permission
# Required branch is also accepted (see route-guard.tsx + App.tsx:444).
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- openLink: "coexist://admin/collectives"
- extendedWaitUntil:
    visible: ".*(Collectives|Permission required).*"
    timeout: 20000
- runFlow:
    when:
      visible: "Permission required"
    commands:
      - assertVisible: "Back to dashboard"
      - takeScreenshot: /tmp/maestro-cx-admin-collective-detail-gated
- runFlow:
    when:
      notVisible: "Permission required"
    commands:
      # Tap the first visible collective row. The list renders rows with
      # the collective's name; "Sunshine Coast" is the test admin's
      # default collective and a stable seed in the dev env.
      - tapOn:
          text: ".*Sunshine Coast.*"
          optional: true
      # Fallback: just tap any element that looks like a row entry. The
      # admin list always renders a header + at least one item.
      - extendedWaitUntil:
          visible: ".*(Members|Manage|Leaders|Region|Active).*"
          timeout: 15000
      - takeScreenshot: /tmp/maestro-cx-admin-collective-detail

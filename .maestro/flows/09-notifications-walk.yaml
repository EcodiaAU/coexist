# Notifications screen. The unread-count line is the most stable anchor for
# the test account state today (admin push exists). If the account drains
# to zero unread, the regex's ".*unread.*" still catches the count line.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- openLink: "coexist://notifications"
# The screen has two healthy shapes and the assertion must cover BOTH. When the
# list is EMPTY it renders an empty-state line; when it is POPULATED it renders
# date-grouped cards whose swipe action reads "Mark read" and NO summary banner.
# The old alternation only knew the empty-state copy, so a correctly-populated
# notifications screen failed the flow (observed 2026-07-13: 3 notifications
# rendered fine, flow red). "Mark read" is the populated-state anchor.
- extendedWaitUntil:
    visible: ".*(unread notification|All caught up|No notifications|Mark read).*"
    timeout: 15000
- takeScreenshot: /tmp/maestro-cx-notifications

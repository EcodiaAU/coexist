# /admin/events/create render-only. Deep-link
# coexist://admin/events/create - the resolver's default branch
# forwards the verbatim path so the route mounts under the AdminLayout
# wrapper. Anchors: "New Event" visible h1 (the Header title text
# itself only renders as aria-label "Create Event page header" per
# the batch 4 codification) plus "Publish Event" + "Save as Draft"
# footer buttons. Test account is admin tier so RequireCapability
# `manage_events` passes.
#
# This is the RENDER-ONLY half of the events-create coverage. The
# prod-write-with-cleanup half (substrate create -> UI assert in list
# -> substrate delete -> UI assert gone) is deferred to a separate
# 9x flow; the surface ITSELF is proven by this render so the create-
# cleanup test's job is round-trip integrity, not form discovery.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- openLink: "coexist://admin/events/create"
- extendedWaitUntil:
    visible: "New Event"
    timeout: 20000
- assertVisible: "Publish Event"
- assertVisible: "Save as Draft"
- assertVisible: "Select Collectives"
- takeScreenshot: /tmp/maestro-cx-admin-events-create

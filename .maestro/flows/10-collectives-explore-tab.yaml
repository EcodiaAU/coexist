# /collectives redirects to /explore?tab=collectives. The Collectives tab
# carries Your Collectives, All collectives, Filter by type. Anchor on the
# stable section labels rather than any specific collective name.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- openLink: "coexist://collectives"
- extendedWaitUntil:
    visible: "EXPLORE"
    timeout: 15000
- assertVisible: "Collectives"
- assertVisible: ".*(All collectives|Your Collectives|Filter by type).*"
- takeScreenshot: /tmp/maestro-cx-collectives

# /collectives/:slug/manage render via deep-link, post F4 fix
# (src/hooks/use-deep-link.ts now forwards the third path segment
# for the collectives branch too). collective-manage.tsx is gated
# on canManage (leader or co-leader of the collective, not the
# global admin role). For the code@ test account which is global
# admin but not a Sunshine Coast leader, the page falls through
# to the EmptyState branch: Header title "Manage" + "Access denied"
# + "Only leaders and co-leaders can manage the collective" +
# "Go Back" button. Either branch proves the route mounted under
# the F4 fix - both versions only render after the deep-link
# resolver forwards the third segment.
#
# Sunshine Coast is hardcoded as the slug (the same collective
# used by 36-collective-detail). Home-ErrorBoundary workaround as
# per F6 in COVERAGE.md - the route ErrorBoundary wraps only `/`,
# so deep-link past it.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: ".*(Welcome back|YOUR NEXT EVENT|Something went wrong).*"
    timeout: 30000
- runFlow:
    when:
      visible: "Welcome back"
    commands:
      - tapOn: "Email.*"
      - inputText: ${MAESTRO_CX_EMAIL}
      - tapOn: "Password.*"
      - inputText: ${MAESTRO_CX_PASSWORD}
      - hideKeyboard
      - tapOn: "Log In"
      - extendedWaitUntil:
          notVisible: "Welcome back"
          timeout: 25000
- openLink: "coexist://collectives/sunshine-coast/manage"
- extendedWaitUntil:
    visible: ".*(Access denied|Manage Collective).*"
    timeout: 20000
- takeScreenshot: /tmp/maestro-cx-collective-manage

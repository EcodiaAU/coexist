# Settings subpages: Notifications (toggles), Privacy (visibility/blocked),
# Account (security/danger zone). Each is a render + label assertion - no
# state mutation; toggles flipped here would persist on the live account.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
# Notifications
- openLink: "coexist://settings/notifications"
- extendedWaitUntil:
    visible: "EVENT & APP NOTIFICATIONS"
    timeout: 15000
- assertVisible: "Event Reminders"
- assertVisible: "Registration Confirmed"
- assertVisible: "Event Cancelled"
- assertVisible: "Event Updated"
- assertVisible: "New Events"
- assertVisible: "Event Invites"
- takeScreenshot: /tmp/maestro-cx-settings-notifications
# Privacy
- openLink: "coexist://settings/privacy"
- extendedWaitUntil:
    visible: "VISIBILITY"
    timeout: 15000
- assertVisible: "Profile Visibility"
- assertVisible: "Marketing Emails"
- assertVisible: "BLOCKED USERS"
- assertVisible: "Blocked Users"
- takeScreenshot: /tmp/maestro-cx-settings-privacy
# Account (security + danger zone)
- openLink: "coexist://settings/account"
- extendedWaitUntil:
    visible: "SECURITY"
    timeout: 15000
- assertVisible: "Change Password"
- assertVisible: "Change Email"
- assertVisible: "DATA & PRIVACY"
- assertVisible: "Your Data & Privacy"
- assertVisible: "DANGER ZONE"
- assertVisible: "Delete Account"
- takeScreenshot: /tmp/maestro-cx-settings-account

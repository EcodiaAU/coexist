# Admin -> Surveys. Hero + SURVEYS/TEMPLATES cards + Create Survey CTA +
# Surveys/Templates/Results tabs. Asserts the section labels rather than
# any specific survey title.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- openLink: "coexist://admin/surveys"
- extendedWaitUntil:
    visible: "Surveys"
    timeout: 15000
- assertVisible: "SURVEYS"
- assertVisible: "TEMPLATES"
- assertVisible: "Create Survey"
- assertVisible: "Templates"
- assertVisible: "Results"
- takeScreenshot: /tmp/maestro-cx-admin-surveys

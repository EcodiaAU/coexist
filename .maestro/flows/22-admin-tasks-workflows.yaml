# Admin -> Tasks (Workflows). Hero + Templates / KPI Dashboard tabs +
# Create Template CTA + Scope/Schedule filters.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- openLink: "coexist://admin/tasks"
- extendedWaitUntil:
    visible: "Workflows"
    timeout: 15000
- assertVisible: "Create Template"
- assertVisible: "Templates"
- assertVisible: "KPI Dashboard"
- takeScreenshot: /tmp/maestro-cx-admin-tasks

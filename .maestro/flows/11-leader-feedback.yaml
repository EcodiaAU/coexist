# Leader-suite event survey feedback (shipped 2026-06-17). Co-Exist leaders/
# co-leaders/assist-leaders see attendee survey feedback scoped to their
# collective; managers/admins see all via the collective selector. Test account
# is admin (isAnyLeader = isStaff) so it sees the leader suite.
#
# Repaired 2026-06-22: the old path opened the More drawer and waited for
# "Feedback", but the leader "Feedback" nav item sits below the fold in the
# drawer (after the Admin + Settings sections), so the un-scrolled wait failed.
# Deep-link straight to /leader/feedback instead - the robust path. Verified
# on-device coexist_aosp 2026-06-22: the page renders "EVENT FEEDBACK" eyebrow
# + "<Collective> Feedback" hero + "N RESPONSES / N EVENTS" + per-event response
# cards (Adelaide has DB-verified responses).
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - runFlow: ../subflows/relogin.yaml
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 25000
- takeScreenshot: /tmp/maestro-cx-home
# ── Open the leader-suite Feedback page directly (drawer item is below fold) ──
- openLink: "coexist://leader/feedback"
- extendedWaitUntil:
    visible: ".*(EVENT FEEDBACK|Feedback).*"
    timeout: 20000
- assertVisible: ".*(RESPONSES|responses|No feedback yet).*"
- takeScreenshot: /tmp/maestro-cx-feedback-default
# ── Switch focused collective via the selector (admin sees all collectives) ──
- tapOn:
    text: ".*(Adelaide|All Collectives|Collective).*"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    text: "Brisbane"
    optional: true
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: /tmp/maestro-cx-feedback-brisbane
# ── Expand the first event response group ──
- tapOn:
    text: ".*response.*"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: /tmp/maestro-cx-feedback-expanded

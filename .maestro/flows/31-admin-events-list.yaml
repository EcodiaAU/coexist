# Admin -> Events landing list (NOT the metrics invariance: that lives in
# 05-admin-metrics-invariance which DB-verifies the numbers). This flow
# proves the list page renders + the BIGGEST EVENT card mounts + the
# Create New Event CTA is reachable. The actual create-assert-DELETE
# round-trip is queued for the next batch.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- openLink: "coexist://admin/events"
- extendedWaitUntil:
    visible: "Events"
    timeout: 15000
- assertVisible: "UPCOMING"
- assertVisible: "REGISTRATIONS"
- assertVisible: "AVG ATTENDANCE"
- assertVisible: "Create New Event"
- assertVisible: "BIGGEST EVENT"
- takeScreenshot: /tmp/maestro-cx-admin-events-list

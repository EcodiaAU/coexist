# Profile -> Tickets: assert the empty state copy and the Explore Events CTA.
# Anchors from cxh-profile-tickets harvest. Empty-state copy is stable and
# is the right early-state assertion until tickets exist on the test account.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- tapOn: ".*Profile.*"
- extendedWaitUntil:
    visible: "Tickets"
    timeout: 15000
- tapOn: "Tickets"
# The My Tickets list is fixture-dependent. A fresh account renders the empty
# state ("No tickets yet" + Explore Events CTA), but the shared test account
# accrues real tickets from campout / guest-checkout / event-registration test
# flows, so it renders the populated "Upcoming" / "Past" sections instead. The
# page header (Header title="My Tickets") is NOT a reliable anchor: on-device
# it renders as just the back chevron with no visible title text. So assert
# whichever of the two valid list-body states the account currently has. (Was:
# hard "No tickets yet" empty-state assert, which broke once the account gained
# tickets via the campout/guest-checkout test flows.)
- extendedWaitUntil:
    visible: ".*(No tickets yet|Upcoming|Past).*"
    timeout: 15000
- takeScreenshot: /tmp/maestro-cx-profile-tickets

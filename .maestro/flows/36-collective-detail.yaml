# Customer-side /collectives/:slug detail. Reached via the Explore tab's
# Collectives toggle then tap-the-first-row (the customer list does not
# expose deep-link-friendly slugs in the home feed). Asserts the detail
# page mounts (heading + a stable section label like Events or Members).
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- openLink: "coexist://explore"
- extendedWaitUntil:
    visible: "EXPLORE"
    timeout: 15000
- tapOn: "Collectives"
- extendedWaitUntil:
    visible: ".*(Your Collectives|All collectives|Filter by type).*"
    timeout: 15000
# Tap the first collective row. Sunshine Coast is the test admin's
# default collective so its name is a stable anchor when present.
- tapOn:
    text: ".*Sunshine Coast.*"
    optional: true
- extendedWaitUntil:
    visible: ".*(About|Members|Upcoming|Join|Events).*"
    timeout: 15000
- takeScreenshot: /tmp/maestro-cx-collective-detail

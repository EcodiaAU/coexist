# Profile -> Edit Profile render check.
# Authoring note (2026-06-10): a full edit-save-revert round trip was
# attempted but Save Changes completes on the surface while the profile
# read-back still shows the original Display Name (suggests stale cache
# or display_name vs name mismatch in the read path). That's a finding
# worth its own flow + investigation; this flow stays a render walk so
# coverage doesn't regress while the round-trip is being characterised.
# Anchors from probe-profile-edit screenshot.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- tapOn: ".*Profile.*"
- extendedWaitUntil:
    visible: "Edit Profile"
    timeout: 15000
- tapOn: "Edit Profile"
- extendedWaitUntil:
    visible: "Personal Details"
    timeout: 15000
- assertVisible: "First Name"
- assertVisible: "Last Name"
- assertVisible: "Display Name"
- assertVisible: "Pronouns"
- assertVisible: "Save Changes"
- takeScreenshot: /tmp/maestro-cx-profile-edit

# /donate/thank-you: post-donation render. The page defaults amount to $25
# when no ?amount query param is supplied (donate/thank-you.tsx:136-141:
# `Number(searchParams.get('amount') ?? 25)`), so a bare deep-link is a
# safe render walk; no real donation is created. Anchors: the eyebrow
# "Donation Successful" + heading "Thank you!" + the dollar amount tile.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- openLink: "coexist://donate/thank-you"
- extendedWaitUntil:
    visible: "Thank you!"
    timeout: 15000
- assertVisible: "Donation Successful"
- assertVisible: ".*\\$25.*"
- takeScreenshot: /tmp/maestro-cx-donate-thank-you

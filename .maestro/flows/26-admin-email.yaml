# Admin -> Email Marketing. Hero + SUBSCRIBERS / CAMPAIGNS SENT /
# BOUNCES / SUPPRESSED metric cards + Campaigns/Templates/System tabs +
# All Status filter + New Campaign CTA.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- openLink: "coexist://admin/email"
- extendedWaitUntil:
    visible: "Email Marketing"
    timeout: 15000
- assertVisible: "SUBSCRIBERS"
- assertVisible: "CAMPAIGNS SENT"
- assertVisible: "BOUNCES"
- assertVisible: "SUPPRESSED"
- assertVisible: "Campaigns"
- assertVisible: "Templates"
- assertVisible: "New Campaign"
- takeScreenshot: /tmp/maestro-cx-admin-email

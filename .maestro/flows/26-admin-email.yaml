# Admin -> Email Marketing. Hero + SUBSCRIBERS / CAMPAIGNS SENT / BOUNCES /
# SUPPRESSED metric cards + tab bar (Quick Send / History / Templates / System
# / Subscribers / Tags / Delivery; default tab Quick Send). The campaigns tab
# was renamed "History" (the old "Campaigns" / "New Campaign" asserts were
# stale) - assert the real tab labels (verified on-device coexist_aosp
# 2026-06-22).
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - runFlow: ../subflows/relogin.yaml
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- openLink: "coexist://admin/email"
- extendedWaitUntil:
    visible: "Email Marketing"
    timeout: 15000
- assertVisible: "SUBSCRIBERS"
- assertVisible: "CAMPAIGNS SENT"
- assertVisible: "BOUNCES"
- assertVisible: "SUPPRESSED"
# Tab bar (default tab is Quick Send; the campaigns tab is now "History").
- assertVisible: "Quick Send"
- assertVisible: "History"
- assertVisible: "Templates"
- takeScreenshot: /tmp/maestro-cx-admin-email

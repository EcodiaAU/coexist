# Admin -> Legal Pages (Organisational Policies) and Emergency Contacts.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
# Legal pages (Organisational Policies)
- openLink: "coexist://admin/legal-pages"
- extendedWaitUntil:
    visible: "Organisational Policies"
    timeout: 15000
- assertVisible: ".*Terms of Service.*"
- takeScreenshot: /tmp/maestro-cx-admin-legal-pages
# Emergency Contacts
- openLink: "coexist://admin/contacts"
- extendedWaitUntil:
    visible: "Emergency Contacts"
    timeout: 15000
- assertVisible: "Add Contact"
- assertVisible: "TOTAL"
- assertVisible: "CATEGORIES"
- assertVisible: "STATE-SPECIFIC"
- assertVisible: ".*Search contacts.*"
- takeScreenshot: /tmp/maestro-cx-admin-contacts

# Canonical authed signin, COLD-CLEAR variant (status_board 1b1e718d).
# clearState:true exercises the fresh-install authed sign-in path that used
# to blank for 60s+. The self-heal double-launch was removed once 1b1e718d
# was fixed (per the original TODO in this file); first paint now reaches the
# auth shell directly, so a single cold-clear launch must render the login
# form within budget. Creds via MAESTRO_* env. The strict unhealed cold-clear
# canary lives in 90-cold-start-render.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: true
    stopApp: true
# Cold-clear lands on the signed-out auth shell. First paint must reach it
# without waiting on the network now that the blank-paint bug is fixed (12s
# budget mirrors the 90-cold-start canary, sized to the offline cold-JIT
# worst case measured 2026-06-18).
- extendedWaitUntil:
    visible: ".*(Welcome back|Log In|Email).*"
    timeout: 12000
# Conditional login: a prior flow may have left the account signed in
# (sessions persist); signin is exercised whenever the state is signed
# out, and the home assertions run either way.
- runFlow:
    when:
      visible: "Welcome back"
    commands:
      - tapOn: "Email.*"
      - inputText: ${MAESTRO_CX_EMAIL}
      - tapOn: "Password.*"
      - inputText: ${MAESTRO_CX_PASSWORD}
      # Do NOT hideKeyboard here: on Android Capacitor it issues a BACK press,
      # and on this cold-clear (clearState:true) the login screen is the router
      # root, so BACK exits the app to the launcher (COVERAGE.md rule). Scroll
      # the Log In button above the keyboard instead, then tap it.
      - scrollUntilVisible:
          element:
            text: "Log In"
          direction: DOWN
      - tapOn: "Log In"
      - extendedWaitUntil:
          notVisible: "Welcome back"
          timeout: 25000
# Authed home anchors, verified from the 2026-06-10 post-login screenshot
# (greeting is time-of-day dynamic, so the name + stable strings anchor).
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 20000
- assertVisible: "Explore. Connect. Protect."
- assertVisible: ".*Ecodia"
- takeScreenshot: /tmp/maestro-cx-postlogin

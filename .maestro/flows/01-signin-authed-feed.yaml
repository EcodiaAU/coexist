# Canonical authed signin, COLD-CLEAR variant (status_board 1b1e718d).
# clearState:true exercises the fresh-install authed sign-in path that used
# to blank for 60s+. The self-heal double-launch was removed once 1b1e718d
# was fixed (per the original TODO in this file); first paint now reaches the
# auth shell directly, so a single cold-clear launch must render the login
# form within budget. Creds via MAESTRO_* env. The strict unhealed cold-clear
# canary lives in 90-cold-start-render.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: true
    stopApp: true
# Cold-clear lands on the signed-out auth shell within a 12s budget (mirrors the
# 90-cold-start canary, sized to the offline cold-JIT worst case 2026-06-18).
# SELF-HEAL (re-added 2026-07-15): the 1b1e718d blank-paint has a residual
# intermittency on the software-GPU emulator - roughly 1 cold-clear in N paints
# blank past 12s (observed this session; the 90 canary passed 5/5 immediately
# before, so it is a transient bad frame, not a regression). Because 01 seeds the
# authed session for the whole first flow block, one blank sample here used to
# cascade every downstream flow to red. So the first paint is OPTIONAL and a
# single relaunch heals a blank frame. The STRICT unhealed cold-clear canary
# stays in 90-cold-start-render, which is the real regression guard.
- extendedWaitUntil:
    visible: ".*(Welcome back|Log In|Email).*"
    timeout: 12000
    optional: true
- runFlow:
    when:
      notVisible: ".*(Welcome back|Log In|Email|YOUR NEXT EVENT|COMING UP IN YOUR COLLECTIVE|No events on your calendar).*"
    commands:
      - launchApp:
          clearState: false
          stopApp: true
      - extendedWaitUntil:
          visible: ".*(Welcome back|Log In|Email|YOUR NEXT EVENT|COMING UP IN YOUR COLLECTIVE|No events on your calendar).*"
          timeout: 15000
# Conditional login: a prior flow may have left the account signed in
# (sessions persist); signin is exercised whenever the state is signed
# out, and the home assertions run either way.
- runFlow:
    when:
      visible: "Welcome back"
    commands:
      - tapOn: "Email.*"
      - inputText: ${MAESTRO_CX_EMAIL}
      - tapOn: "Password.*"
      - inputText: ${MAESTRO_CX_PASSWORD}
      # Do NOT hideKeyboard here: on Android Capacitor it issues a BACK press,
      # and on this cold-clear (clearState:true) the login screen is the router
      # root, so BACK exits the app to the launcher (COVERAGE.md rule). Scroll
      # the Log In button above the keyboard instead, then tap it.
      - scrollUntilVisible:
          element:
            text: "Log In"
          direction: DOWN
      - tapOn: "Log In"
      - extendedWaitUntil:
          notVisible: "Welcome back"
          timeout: 25000
# Authed home anchors. The greeting (".*Ecodia" = "Good <time>, Ecodia") is
# present in EVERY authed-home state and is the stable proof of authed home.
# The "Your Next Event" heading only renders when the account has a registered
# upcoming event; since the 2026-07-15 fallback-card change, an account with no
# registered event lands on the "Coming up in your collective" fallback (or the
# "No events on your calendar yet" empty state) instead - so the home-loaded
# gate accepts all three, and does not hinge on registration state.
#
# The "Explore. Connect. Protect." subtitle was REMOVED from the home greeting
# 2026-07-15 (Tate: bigger greeting, drop the tagline), so it is no longer a
# home anchor. It survives only as the document <title>, which Maestro's a11y
# tree does not surface.
- extendedWaitUntil:
    visible: ".*(YOUR NEXT EVENT|COMING UP IN YOUR COLLECTIVE|No events on your calendar).*"
    timeout: 20000
- assertVisible: ".*Ecodia"
- takeScreenshot: /tmp/maestro-cx-postlogin

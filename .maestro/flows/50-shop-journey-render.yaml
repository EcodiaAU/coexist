# Shop journey: render the cart + checkout + orders surfaces. Render
# only because Stripe Checkout is a webview that leaves the app; we
# assert the in-app surfaces mount and the checkout CTA appears, then
# stop. The orders list + a single order detail need a seeded order
# on the test account; the assertion is either-branch (orders list
# or empty-state) so the flow stays green either way.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
# /shop landing (already covered by 12-shop-walk but we re-enter here
# to take the first-card path)
- openLink: "coexist://shop"
- extendedWaitUntil:
    visible: ".*(Shop|Merch|Store|Products|Cart).*"
    timeout: 15000
# /shop/cart
- openLink: "coexist://shop/cart"
- extendedWaitUntil:
    visible: ".*(Cart|Your cart is empty|Checkout|Continue Shopping|Subtotal).*"
    timeout: 15000
# /shop/orders
- openLink: "coexist://shop/orders"
- extendedWaitUntil:
    visible: ".*(Orders|My Orders|No orders yet|Order History).*"
    timeout: 15000
# /shop/order-confirmation (post-checkout landing; without a real
# session we expect either a fallback or a redirect)
- openLink: "coexist://shop/order-confirmation"
- extendedWaitUntil:
    visible: ".*(Order|Confirmation|Thank|Shop|Cart|No order).*"
    timeout: 15000
- takeScreenshot: /tmp/maestro-cx-shop-journey-render

# F3 happy-path canary (INVERTED 2026-06-22 - the bug it guarded is FIXED).
#
# History: coexist://admin/insights used to deep-link onto the signed-OUT
# WelcomePage marketing shell ("EXPLORE. CONNECT. PROTECT." + Get Started /
# I have an account) even with a live session - AdminInsightsPage's lazy
# import threw, the Suspense boundary surfaced the Welcome shell, and the
# router fell back to the unauthed marketing route. This canary used to
# assert that buggy outcome and stay RED until F3 was fixed.
#
# F3 is now fixed: the deep-link routes to the authed admin Insights screen
# (hero "Insights", OVERVIEW stat grid 469 EVENTS / 7,752 ATTENDANCES, the
# All Time / All Collectives / All Types filter bar, "Select all"). Verified
# on-device coexist_aosp 2026-06-22.
#
# So this canary is inverted to the HAPPY path: it asserts the authed
# Insights surface renders and that the marketing Welcome shell does NOT.
# Green = deep-link lands on authed Insights, never the unauthed marketing
# route. It goes RED again the instant the lazy-load/boundary regression
# returns and the deep-link falls back to the Welcome shell.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - runFlow: ../subflows/relogin.yaml
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- openLink: "coexist://admin/insights"
# HAPPY PATH: the authed Insights surface must render. OVERVIEW + Select all
# are unique to the authed admin Insights page.
- extendedWaitUntil:
    visible: "OVERVIEW"
    timeout: 20000
- assertVisible: "Select all"
- assertVisible: "ATTENDANCES"
# The marketing Welcome shell must NOT be the landing. These strings are
# unique to the signed-out WelcomePage that the F3 bug used to surface.
- assertNotVisible: "EXPLORE. CONNECT. PROTECT."
- assertNotVisible: "Get Started"
- assertNotVisible: "I have an account"
- takeScreenshot: /tmp/maestro-cx-f3-canary-authed-insights

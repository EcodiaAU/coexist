# F3 strict canary: coexist://admin/insights deep-link lands on the
# signed-OUT WelcomePage marketing shell ("EXPLORE. CONNECT. PROTECT."
# + Get Started / I have an account) even when the session is alive
# (YOUR NEXT EVENT was visible immediately before the deep-link).
# Reproduced 2026-06-10 with this flow on emulator-5554.
#
# This is NOT a capability gate (the EmptyState for missing
# view_reports reads "Permission required" + "Back to dashboard");
# the deep-link bypasses the active session for /admin/insights
# specifically. Hypothesis: AdminInsightsPage's lazy import throws
# (it loads three sub-pages lazily), the Suspense boundary surfaces
# the Welcome shell rather than a permission EmptyState, and the
# router falls back to the unauthed marketing route. Needs a
# code-side fix on lazy-load + boundary handling.
#
# This canary stays RED until F3 is fixed. The fix lands when the
# deep-link routes to an authed-admin screen (insights tabs OR
# Permission required EmptyState, never the marketing Welcome).
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- openLink: "coexist://admin/insights"
# Assert the actual buggy outcome: marketing Welcome shell renders.
# When this assert FAILS (because we routed to insights tabs or
# Permission required), F3 has been fixed and this canary should be
# inverted to the happy-path assertion.
- extendedWaitUntil:
    visible: "EXPLORE. CONNECT. PROTECT."
    timeout: 15000
- assertVisible: "Get Started"
- assertVisible: "I have an account"
- takeScreenshot: /tmp/maestro-cx-f3-canary-welcome-shell

# /events/:id/survey render via deep-link, post F4 fix
# (src/hooks/use-deep-link.ts now forwards the third path segment).
# The seeded event is upcoming + free + public + no in-bundle test-user
# attendance row, so post-event-survey.tsx hits the `if (!attendance)`
# branch at line 241 and renders the "Survey not available" EmptyState
# with description naming "Only checked-in attendees" + the
# "Back to Event" CTA. That's the stable anchor that proves the route
# mounted under the page-level attendance gate after F4 fixed the
# deep-link resolver. (The unblock-A path - seed a past event with
# attendance.status='attended' - is queued for the next batch when
# the substrate seed lands.)
#
# Auth handling: post-batch-8 the cold-launch home route trips
# ErrorBoundary "Something went wrong" before YOUR NEXT EVENT renders
# (codified as F6 in COVERAGE.md). The route ErrorBoundary at
# App.tsx:366 wraps ONLY the home route, so a coexist:// deep-link
# straight to a sub-route mounts the target page cleanly. The flow
# below treats the home anchor as optional and uses Welcome-back as
# the signin gate.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: ".*(Welcome back|YOUR NEXT EVENT|Something went wrong).*"
    timeout: 30000
- runFlow:
    when:
      visible: "Welcome back"
    commands:
      - tapOn: "Email.*"
      - inputText: ${MAESTRO_CX_EMAIL}
      - tapOn: "Password.*"
      - inputText: ${MAESTRO_CX_PASSWORD}
      - hideKeyboard
      - tapOn: "Log In"
      - extendedWaitUntil:
          notVisible: "Welcome back"
          timeout: 25000
- runScript: ../scripts/seed-event-id.js
- openLink: "coexist://events/${output.eventId}/survey"
- extendedWaitUntil:
    visible: "Survey not available"
    timeout: 20000
- assertVisible: "Back to Event"
- takeScreenshot: /tmp/maestro-cx-events-survey

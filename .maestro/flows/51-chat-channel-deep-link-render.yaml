# /chat/channel/:channelId render via deep-link. Closes the F2 entry-
# point gap by seeding a real channel id the test account is a member
# of (signed-in REST query to staff_channel_memberships) and opening
# coexist://chat/channel/<id>. Anchor: the channel name itself (the
# Header title is dynamic to channel.name when collective is false:
# chat-room.tsx:807-810).
#
# Why deep-link reaches this route (vs the F4-broken events sub-paths):
# the resolver's switch only intercepts events/collectives/member/share
# (use-deep-link.ts:24-37). 'chat' is unhandled and falls through to
# default which returns `/${rawPath}` = `/chat/channel/<id>` verbatim.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- runScript: ../scripts/seed-channel-id.js
- openLink: "coexist://chat/channel/${output.channelId}"
- extendedWaitUntil:
    visible: "${output.channelName}"
    timeout: 20000
- takeScreenshot: /tmp/maestro-cx-chat-channel

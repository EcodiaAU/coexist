# Referral page. Stable: Grow the Movement hero, YOUR REFERRAL CODE label,
# Generate Your Code CTA. No code generation (read-only walk).
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- openLink: "coexist://referral"
- extendedWaitUntil:
    visible: "Grow the Movement"
    timeout: 15000
- assertVisible: "YOUR REFERRAL CODE"
- assertVisible: "Generate Your Code"
- takeScreenshot: /tmp/maestro-cx-referral

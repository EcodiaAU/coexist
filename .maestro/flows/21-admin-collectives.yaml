# Admin -> Collectives. Hero "Collectives" + Create CTA + search + Active/
# Archived/All tabs + a list of collective rows, each rendering "N members"
# and "N events" inline (lowercase). The old uppercase COLLECTIVES/MEMBERS/
# EVENTS stat cards were removed in the collectives redesign - assert what
# actually renders now (verified on-device coexist_aosp 2026-06-22).
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - runFlow: ../subflows/relogin.yaml
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- openLink: "coexist://admin/collectives"
# Hero "Collectives" (also the bottom-tab label) is the landing anchor.
- extendedWaitUntil:
    visible: "Collectives"
    timeout: 15000
- assertVisible: ".*Search collectives.*"
- assertVisible: "Active"
- assertVisible: "Archived"
# Collective rows render "N members" / "N events" inline (lowercase).
- assertVisible: ".*members.*"
- assertVisible: ".*events.*"
- takeScreenshot: /tmp/maestro-cx-admin-collectives

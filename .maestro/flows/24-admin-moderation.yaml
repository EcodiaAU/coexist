# Admin -> Moderation. Hero + Pending/Approved/Removed/Dismissed tabs +
# "X reports pending review" banner. Does not act on any report.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- openLink: "coexist://admin/moderation"
- extendedWaitUntil:
    visible: "Content Moderation"
    timeout: 15000
- assertVisible: "Pending"
- assertVisible: "Approved"
- assertVisible: "Removed"
- takeScreenshot: /tmp/maestro-cx-admin-moderation

# /events/:id/day render via LEADER ACTIONS tap. Deep-link to event
# detail, scroll to the LEADER ACTIONS rail, tap "Event Day" - which
# react-router navigates to /events/<id>/day. Anchor proof: the on-page
# "Attendees" tab label that only renders on the day-of dashboard, NOT
# on event-detail. Deep-link prefix workaround documented as F4 - the
# deep-link resolver at src/hooks/use-deep-link.ts:26 strips path
# segments after :id (only [first, second] are read), so
# coexist://events/<id>/day silently lands on /events/<id>. UI tap is
# the canonical entry path for upcoming-event leaders anyway.
appId: org.coexistaus.app
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: false
    stopApp: true
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
    optional: true
- runFlow:
    when:
      notVisible: "YOUR NEXT EVENT"
    commands:
      - stopApp
      - launchApp:
          clearState: false
- extendedWaitUntil:
    visible: "YOUR NEXT EVENT"
    timeout: 30000
- runScript: ../scripts/seed-event-id.js
- openLink: "coexist://events/${output.eventId}"
- extendedWaitUntil:
    visible: "LEADER ACTIONS"
    timeout: 20000
- scrollUntilVisible:
    element:
      text: "Event Day"
    direction: DOWN
    timeout: 8000
    speed: 40
- tapOn: "Event Day"
- extendedWaitUntil:
    visible: "Attendees"
    timeout: 15000
- takeScreenshot: /tmp/maestro-cx-events-day

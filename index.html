<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Default SEO (overridden per-page by react-helmet-async) -->
    <title>Co-Exist | Explore. Connect. Protect.</title>
    <meta name="description" content="Australia's youth conservation platform. Join local events, connect with collectives, plant native trees, clean beaches, and track your real-world environmental impact." />

    <!-- Theme & PWA -->
    <meta name="theme-color" content="#1B4332" />
    <!-- Force light color scheme. Without this Android WebView's algorithmic
         darkening can invert the splash bg (#fafaf8 -> dark) on devices where
         the user has system dark mode on. The app is light-only by design. -->
    <meta name="color-scheme" content="light" />
    <meta name="application-name" content="Co-Exist" />
    <meta name="apple-mobile-web-app-title" content="Co-Exist" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Default OG (overridden per-page) -->
    <meta property="og:site_name" content="Co-Exist" />
    <meta property="og:locale" content="en_AU" />
    <meta property="og:type" content="website" />
  </head>
  <body style="background-color:#f8f9f5">
    <div id="root"></div>
    <!--
      Synchronous boot-error overlay. Diagnostic for the 1.8.13-1.8.16
      iOS white-screen. Registered BEFORE the module script loads, so
      any error during module-level evaluation (the dominant suspect
      after lazy app-version refactor didn't fix it) lands on screen
      instead of leaving the WebView blank.
    -->
    <script>
      (function () {
        // Build-time env injection via Vite's %VITE_*% replacement.
        // If undefined, Vite leaves the placeholder literal, which is
        // exactly the diagnostic we want.
        window.__DEBUG_BOOT = {
          url: '%VITE_SUPABASE_URL%',
          keyPrefix: '%VITE_SUPABASE_ANON_KEY%'.slice(0, 24),
          mode: '%MODE%',
          time: new Date().toISOString(),
        };
        // Scope: visible overlay only paints during the boot window. After 5s
        // (or once React signals window.__APP_MOUNTED = true) the overlay
        // mutes itself and any further errors land in console only. Without
        // this, a transient post-mount error (e.g. Realtime channel hiccup,
        // network blip) paints a white overlay across a working app - the
        // exact symptom of the 1.8.21 Supabase Realtime double-join.
        var BOOT_WINDOW_MS = 5000;
        var paintsAllowed = true;
        setTimeout(function () { paintsAllowed = false; }, BOOT_WINDOW_MS);
        function paint(label, payload) {
          var headForLog = '';
          try {
            if (typeof payload === 'string') headForLog = payload;
            else if (payload) headForLog = (payload.name ? payload.name + ': ' : '') + (payload.message ? payload.message : String(payload));
          } catch (e) { headForLog = String(payload); }
          try { console.error('[boot-error]', label, headForLog, payload); } catch (e) { /* ignore */ }
          if (!paintsAllowed || window.__APP_MOUNTED) return;
          try {
            var div = document.getElementById('boot-error');
            if (!div) {
              div = document.createElement('div');
              div.id = 'boot-error';
              div.style.cssText = 'position:fixed;inset:0;background:#fff;color:#000;padding:20px;font:13px ui-monospace,Menlo,monospace;white-space:pre-wrap;overflow:auto;z-index:99999;line-height:1.4';
              div.textContent = 'BOOT ENV\n url: ' + window.__DEBUG_BOOT.url + '\n key: ' + window.__DEBUG_BOOT.keyPrefix + '...\n mode: ' + window.__DEBUG_BOOT.mode + '\n time: ' + window.__DEBUG_BOOT.time + '\n---\n';
              document.body.appendChild(div);
            }
            var head = '';
            var stack = '';
            if (typeof payload === 'string') {
              head = payload;
            } else if (payload) {
              try { head = (payload.name || 'Error') + ': ' + (payload.message || String(payload)); } catch (e) { head = String(payload); }
              try { stack = payload.stack || ''; } catch (e) { stack = ''; }
              if (stack && stack.indexOf(head) === 0) stack = stack.slice(head.length).replace(/^\n/, '');
            } else {
              head = String(payload);
            }
            div.textContent = (div.textContent || '') + '\n[' + label + '] ' + head + (stack ? '\n  ' + stack.split('\n').join('\n  ') : '') + '\n';
          } catch (e) { /* last resort */ }
        }
        window.addEventListener('error', function (e) { paint('error', e.error || e.message || e); });
        window.addEventListener('unhandledrejection', function (e) { paint('promise', e.reason); });
        window.__bootError = paint;
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
